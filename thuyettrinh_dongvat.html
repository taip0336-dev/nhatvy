<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Speaker - Học Thuyết Trình</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdf2f8; overflow: hidden; }
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; display: none; padding: 1.5rem; }
        .view-content.active { display: flex; flex-direction: column; }
        .btn-card { transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 24px; }
        .btn-card:active { transform: scale(0.95); }
        .beep-span { color: #db2777; font-weight: 800; background: #fdf2f8; padding: 2px 8px; border-radius: 6px; border: 2px dashed #f9a8d4; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-pink-50">

    <div class="max-w-2xl mx-auto bg-white min-h-screen shadow-2xl relative overflow-hidden flex flex-col">
        
        <header id="app-header" class="hidden p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <button onclick="goToMenu()" class="text-pink-600 font-bold flex items-center gap-2 bg-pink-50 px-4 py-2 rounded-xl">
                ⬅️ MENU
            </button>
            <h2 id="header-title" class="font-bold text-gray-700">PHẦN HỌC</h2>
            <div class="w-10"></div>
        </header>

        <div id="view-menu" class="view-content active items-center justify-center space-y-6">
              <a href="index.html" class="mt-8 text-gray-400 font-bold hover:text-pink-500 border-t pt-4 w-full text-center">
                🏠 QUAY VỀ TRANG CHỦ
            </a>
            <div class="text-center mb-6">
                <div class="text-7xl mb-4 animate-bounce">🌟</div>
                <h1 class="text-3xl font-bold text-pink-600">LITTLE SPEAKER</h1>
                <p class="text-gray-400">Bé muốn học phần nào hôm nay?</p>
            </div>

            <button onclick="showView('vocab', 'PHẦN 1: TỪ VỰNG')" class="btn-card w-full bg-blue-500 text-white p-6 flex items-center gap-6 shadow-lg shadow-blue-100">
                <span class="text-4xl bg-white/20 p-3 rounded-2xl">📚</span>
                <div class="text-left">
                    <p class="font-bold text-xl">PHẦN 1: TỪ VỰNG</p>
                    <p class="text-sm opacity-90">Luyện phát âm từ khó</p>
                </div>
            </button>

            <button onclick="showView('patterns', 'PHẦN 2: MẪU CÂU')" class="btn-card w-full bg-purple-500 text-white p-6 flex items-center gap-6 shadow-lg shadow-purple-100">
                <span class="text-4xl bg-white/20 p-3 rounded-2xl">🗣️</span>
                <div class="text-left">
                    <p class="font-bold text-xl">PHẦN 2: MẪU CÂU</p>
                    <p class="text-sm opacity-90">Tập các cấu trúc hay</p>
                </div>
            </button>

            <button onclick="showView('presentation', 'PHẦN 3: THUYẾT TRÌNH')" class="btn-card w-full bg-pink-500 text-white p-6 flex items-center gap-6 shadow-lg shadow-pink-100">
                <span class="text-4xl bg-white/20 p-3 rounded-2xl">🎤</span>
                <div class="text-left">
                    <p class="font-bold text-xl">PHẦN 3: THUYẾT TRÌNH</p>
                    <p class="text-sm opacity-90">Thực hành cả bài nói</p>
                </div>
            </button>
            
           <div class="text-center mb-6">
                <div class="text-7xl mb-4 animate-bounce">🌟</div>                
                <p class="text-gray-400">Chờ bài tiếp theo con Nhật Vy nhé!</p>
            </div>
        </div>

        <div id="view-vocab" class="view-content">
            <div id="vocab-list" class="grid grid-cols-2 gap-4">
                <!-- Data injected by JS -->
            </div>
        </div>

        <div id="view-patterns" class="view-content space-y-4">
            <div id="pattern-list" class="space-y-3">
                <!-- Data injected by JS -->
            </div>
        </div>

        <div id="view-presentation" class="view-content !p-0">
            <div class="h-2 bg-gray-100 w-full">
                <div id="progress-bar" class="h-full bg-pink-400 transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="flex-1 p-8 flex flex-col items-center justify-between text-center">
                <div id="pres-icon" class="text-8xl mb-4 transition-all">👋</div>
                <div class="flex-1 flex flex-col justify-center w-full">
                    <p id="pres-en" class="text-2xl font-bold text-gray-800 leading-tight mb-4"></p>
                    <p id="pres-vi" class="text-lg text-gray-500 italic"></p>
                </div>
                <div class="w-full space-y-6">
                    <button onclick="playPresAudio()" class="bg-pink-500 text-white w-20 h-20 rounded-full shadow-lg flex items-center justify-center mx-auto hover:scale-105 active:scale-95 transition-all">
                        <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg>
                    </button>
                    <div class="flex justify-between items-center px-2">
                        <button onclick="prevSlide()" class="text-pink-400 font-bold disabled:opacity-30" id="btn-prev">⬅️ TRƯỚC</button>
                        <span id="pres-count" class="text-gray-300 font-bold">1 / 13</span>
                        <button onclick="nextSlide()" class="text-pink-500 font-bold" id="btn-next">TIẾP ➡️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const vocabData = [
            { en: "Endangered", vi: "Nguy cấp", icon: "⚠️" },
            { en: "Extinct", vi: "Tuyệt chủng", icon: "💀" },
            { en: "Predator", vi: "Thú săn mồi", icon: "🐯" },
            { en: "Deforestation", vi: "Chặt phá rừng", icon: "🪓" },
            { en: "Habitat", vi: "Môi trường sống", icon: "🏡" },
            { en: "Pollution", vi: "Ô nhiễm", icon: "💨" },
            { en: "Hunters", vi: "Thợ săn", icon: "🏹" },
            { en: "Treatment", vi: "Điều trị", icon: "🏥" }
        ];

        const patternData = [
            { en: "Today I'm going to talk about...", vi: "Hôm nay mình sẽ nói về..." },
            { en: "There are 3 main reasons why...", vi: "Có 3 lý do chính tại sao..." },
            { en: "The first one is...", vi: "Cái đầu tiên là..." },
            { en: "So, what should we do to...?", vi: "Vậy, chúng ta nên làm gì để...?" },
            { en: "If not now, then when?", vi: "Nếu không bây giờ, thì bao giờ?" }
        ];

        const presentationData = [
            { en: "Hello everyone, my name is [BEEP].", vi: "Chào mọi người, mình tên là [Bíp].", icon: "👋" },
            { en: "I'm in class 2A1 at [BEEP] school.", vi: "Mình học lớp 2A1 trường [Bíp].", icon: "🏫" },
            { en: "Today I'm going to talk about endangered animals.", vi: "Hôm nay mình sẽ nói về các loài động vật đang gặp nguy hiểm.", icon: "🦁" },
            { en: "There are three main reasons why animals become extinct.", vi: "Có 3 lý do chính khiến động vật bị tuyệt chủng.", icon: "📉" },
            { en: "First, let's talk about natural predators.", vi: "Đầu tiên, hãy nói về thú săn mồi tự nhiên.", icon: "🐯" },
            { en: "Next is pollution and deforestation.", vi: "Tiếp theo là ô nhiễm và chặt phá rừng.", icon: "🌫️" },
            { en: "Deforestation happens when we cut down trees or destroy their habitat.", vi: "Chặt phá rừng xảy ra khi chúng ta chặt cây hoặc phá hủy nơi ở của chúng.", icon: "🪓" },
            { en: "Second is diseases. Animals will die if they don't get treatment.", vi: "Thứ hai là bệnh tật. Động vật sẽ chết nếu không được chữa trị.", icon: "🏥" },
            { en: "The third one is hunters. They hunt animals for money and clothes.", vi: "Thứ ba là thợ săn. Họ săn bắn để kiếm tiền và làm quần áo.", icon: "🏹" },
            { en: "We should stop hunting and plant more trees.", vi: "Chúng ta nên ngừng săn bắn và trồng thêm nhiều cây hơn.", icon: "🌳" },
            { en: "If not now, then when? If not we, then who?", vi: "Nếu không bây giờ thì bao giờ? Nếu không phải chúng ta thì là ai?", icon: "❓" },
            { en: "Let's protect animals together!", vi: "Hãy cùng nhau bảo vệ động vật nhé!", icon: "🤝" },
            { en: "Thank you for listening and goodbye!", vi: "Cảm ơn mọi người đã lắng nghe và tạm biệt!", icon: "✨" }
        ];

        let currentSlide = 0;

        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        function showView(viewId, title) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            const header = document.getElementById('app-header');
            if (viewId === 'menu') {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
                document.getElementById('header-title').innerText = title;
            }

            if (viewId === 'presentation') {
                currentSlide = 0;
                updatePresUI();
            }
            window.speechSynthesis.cancel();
        }

        function goToMenu() { showView('menu'); }

        function initApp() {
            // Render Vocab
            const vList = document.getElementById('vocab-list');
            vocabData.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-blue-50 text-center cursor-pointer hover:bg-blue-50 transition-colors";
                card.innerHTML = `<div class="text-3xl mb-1">${item.icon}</div><div class="font-bold text-blue-600">${item.en}</div><div class="text-xs text-gray-400">${item.vi}</div>`;
                card.onclick = () => speak(item.en);
                vList.appendChild(card);
            });

            // Render Patterns
            const pList = document.getElementById('pattern-list');
            patternData.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "bg-white p-4 rounded-xl border-l-4 border-purple-500 shadow-sm cursor-pointer hover:bg-purple-50 transition-colors";
                itemDiv.innerHTML = `<div class="font-bold text-purple-700">${item.en}</div><div class="text-sm text-gray-400">${item.vi}</div>`;
                itemDiv.onclick = () => speak(item.en);
                pList.appendChild(itemDiv);
            });
        }

        function updatePresUI() {
            const data = presentationData[currentSlide];
            document.getElementById('pres-en').innerHTML = data.en.replace("[BEEP]", "<span class='beep-span'>BÍP</span>");
            document.getElementById('pres-vi').innerText = data.vi;
            document.getElementById('pres-icon').innerText = data.icon;
            document.getElementById('pres-count').innerText = `${currentSlide + 1} / ${presentationData.length}`;
            document.getElementById('progress-bar').style.width = ((currentSlide + 1) / presentationData.length * 100) + '%';
            document.getElementById('btn-prev').disabled = currentSlide === 0;
            
            const nextBtn = document.getElementById('btn-next');
            if (currentSlide === presentationData.length - 1) {
                nextBtn.innerText = "HẾT BÀI 🏆";
                nextBtn.onclick = goToMenu;
            } else {
                nextBtn.innerText = "TIẾP ➡️";
                nextBtn.onclick = nextSlide;
            }
        }

        function nextSlide() { if (currentSlide < presentationData.length - 1) { currentSlide++; updatePresUI(); playPresAudio(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; updatePresUI(); playPresAudio(); } }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function playPresAudio() {
            window.speechSynthesis.cancel();
            const text = presentationData[currentSlide].en;
            
            if (text.includes("[BEEP]")) {
                const parts = text.split("[BEEP]");
                // Read part 1
                const msg1 = new SpeechSynthesisUtterance(parts[0]);
                msg1.lang = 'en-US';
                msg1.rate = 0.8;
                msg1.onend = () => {
                    playBeep();
                    setTimeout(() => {
                        const msg2 = new SpeechSynthesisUtterance(parts[1]);
                        msg2.lang = 'en-US';
                        msg2.rate = 0.8;
                        window.speechSynthesis.speak(msg2);
                    }, 400);
                };
                window.speechSynthesis.speak(msg1);
            } else {
                speak(text);
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
